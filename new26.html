<html>
<head>
	<title>
		LECTURE 26 - MAKING FORM 
	</title>
    <Link href="form.css" rel="stylesheet">
</head>

<body> 
    <div class="container">
        <div class="registration">Regestration Form</div>
        <form>
            <div class="container2">
                <div class="inputbox">
                    <span class="inputtext">Full Name</span>
                    <input type="text" placeholder="Enter Your Name">
                </div>
                <div class="inputbox">
                    <span class="inputtext">User Name</span>
                    <input type="text" placeholder="Enter Your UserName">
                </div>
                <div class="inputbox">
                    <span class="inputtext">Email</span>
                    <input type="email" placeholder="Enter Your Email">
                </div>
                <div class="inputbox">
                    <span class="inputtext">Phone Number</span>
                    <input type="text" placeholder="Enter Your Contact Number">
                </div>
                <div class="inputbox">
                    <span class="inputtext">Password</span>
                    <input type="password" placeholder="Enter Your Password">
                </div>
                <div class="inputbox">
                    <span class="inputtext">Confirm Password</span>
                    <input type="password" placeholder="Confirm Your Password">
                </div>
                <input type="submit" value="Register Your Data" class="lastinput">
            </div>
        </form>
    </div>
</body>

</html>
